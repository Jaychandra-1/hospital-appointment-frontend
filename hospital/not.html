<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">

<div class="card p-5">

<h2 class="text-primary">
Notifications
</h2>

<hr>

<div id="notificationContainer">

</div>

<a href="da.html"
class="btn btn-primary mt-3">

Dashboard

</a>

</div>

</div>

<script>

let currentUser = "Patient";

let currentuser = {
    fullname: "Patient"
};

let notifications=
JSON.parse(localStorage.getItem(currentUser+"_notifications")) || [

{
title:"Appointment Reminder",
message:"Your appointment is scheduled tomorrow.",
status:"Unread"
},

{
title:"Medical Report Available",
message:"Blood report has been uploaded.",
status:"Unread"
}

];

localStorage.setItem(
currentUser+"_notifications",
JSON.stringify(notifications)
);

function loadNotifications(){

let container=
document.getElementById("notificationContainer");

container.innerHTML="";

notifications.forEach(function(note,index){

container.innerHTML+=`

<div class="card p-4 mb-3">

<h5 class="text-primary">

${note.title}

</h5>

<p>

${note.message}

</p>

<p>

Status :

<span class="badge bg-warning">

${note.status}

</span>

</p>

<button
class="btn btn-success btn-sm"
onclick="markRead(${index})">

Mark Read

</button>

<button
class="btn btn-danger btn-sm"
onclick="deleteNotification(${index})">

Delete

</button>

</div>

`;

});

}

function markRead(index){

notifications[index].status="Read";

localStorage.setItem(
currentUser+"_notifications",
JSON.stringify(notifications)
);

loadNotifications();

}

function deleteNotification(index){

notifications.splice(index,1);

localStorage.setItem(
currentUser+"_notifications",
JSON.stringify(notifications)
);

loadNotifications();

}

loadNotifications();

</script>

</body>
</html>
