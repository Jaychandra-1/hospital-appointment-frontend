<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<div class="card p-4 shadow">

<h3>Forgot Password (OTP)</h3>

<input id="fp_email" class="form-control mb-2" placeholder="Email">

<button onclick="sendOTP()" class="btn btn-primary mb-3">
Send OTP
</button>

<div id="otpSection" style="display:none;">
<input id="otp" class="form-control mb-2" placeholder="Enter OTP">
<button onclick="verifyOTP()" class="btn btn-success">Verify OTP</button>
</div>

<div id="resetSection" style="display:none;">
<input id="newPassword" class="form-control mt-3 mb-2" placeholder="New Password">
<input id="confirmPassword" class="form-control mb-2" placeholder="Confirm Password">

<button onclick="resetPassword()" class="btn btn-danger">
Reset Password
</button>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
