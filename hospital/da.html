<div class="main">

<div class="topbar">

<h3 id="welcomeText"></h3>

</div>

<br>

<div class="row">

<div class="col-md-4 mb-4">

<div class="stats-card">

<h1 class="text-primary" id="totalAppointments">
0
</h1>

<h5>Total Appointments</h5>

</div>

</div>


<div class="col-md-4 mb-4">

<div class="stats-card">

<h1 class="text-success" id="completedAppointments">
0
</h1>

<h5>Completed</h5>

</div>

</div>


<div class="col-md-4 mb-4">

<div class="stats-card">

<h1 class="text-warning" id="pendingAppointments">
0
</h1>

<h5>Pending</h5>

</div>

</div>

</div>

<div class="card p-4">

<h4>Recent Appointments</h4>

<div class="table-responsive">

<table class="table">

<thead>

<tr>

<th>ID</th>
<th>Doctor</th>
<th>Date</th>
<th>Status</th>

</tr>

</thead>

<tbody id="appointmentTable">

</tbody>

</table>

</div>

</div>

</div>


<script>

let patient =
JSON.parse(localStorage.getItem("patientData"));

document.getElementById("welcomeText").innerHTML =
"Welcome Back, " +
(patient?.fullname || "Patient") +
" 👋";

let Patient =
JSON.parse(localStorage.getItem("patientData"));

document.getElementById("welcomeText").innerHTML =
"Welcome Back, " +
(patient?.fullname || "Patient") +
" 👋";

let allAppointments =
JSON.parse(localStorage.getItem("appointments")) || [];

let appointments =
allAppointments.filter(app =>
app.patientEmail === patient.email
);

document.getElementById("totalAppointments").innerHTML=
appointments.length;

let completed=
appointments.filter(a=>a.status==="Completed");

document.getElementById("completedAppointments").innerHTML=
completed.length;

let pending=
appointments.filter(a=>a.status==="Pending");

document.getElementById("pendingAppointments").innerHTML=
pending.length;

let table=document.getElementById("appointmentTable");

appointments.forEach(function(app){

table.innerHTML+=`

<tr>

<td>${app.id}</td>

<td>${app.doctor}</td>

<td>${app.date}</td>

<td>
<span class="badge bg-primary">
${app.status}
</span>
</td>

</tr>

`;

});

</script>
<script>

let currentuser = JSON.parse(localStorage.getItem("patientData"));

    "Welcome Back, " + currentuser.fullname + " 👋";

}else{

    document.getElementById("welcomeText").innerHTML =
    "Welcome Back, Patient 👋";

}

</script>
