<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">

<div class="card p-5">

<h2 class="text-primary">

Appointment Tracking

</h2>

<hr>

<div id="trackingDetails">

</div>

<a href="da.html"
class="btn btn-primary mt-3">

Dashboard

</a>

</div>

</div>

<script>


let currentUser = "Patient";

let currentuser = {
    fullname: "Patient"
};
let appointments=
JSON.parse(localStorage.getItem(currentUser+"_appointments")) || [];

let latest=appointments[appointments.length-1];

if(latest){

document.getElementById("trackingDetails").innerHTML=`

<h4>Appointment ID : ${latest.id}</h4>

<p><b>Doctor :</b> ${latest.doctor}</p>

<p><b>Department :</b> ${latest.department}</p>

<p><b>Date :</b> ${latest.date}</p>

<p><b>Time :</b> ${latest.time}</p>

<h5>

Status :

<span class="badge bg-warning">

${latest.status}

</span>

</h5>

<hr>

<h4>Status Timeline</h4>

<ul class="list-group">

<li class="list-group-item">

✔ Appointment Requested

</li>

<li class="list-group-item">

✔ Waiting For Confirmation

</li>

<li class="list-group-item">

✔ Consultation Completed

</li>

</ul>

`;

}
else{

document.getElementById("trackingDetails").innerHTML=

"<h4>No Appointment Found</h4>";

}

</script>

</body>
</html>
