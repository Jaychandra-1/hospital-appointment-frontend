<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medical Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

<h2 class="mb-4 text-primary">Medical Records</h2>

<div id="app"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const app = document.getElementById("app");

    let currentUser = "Patient";

let currentuser = {
    fullname: "Patient"
};
    const key = currentUser + "_medicalRecords";
    const records = JSON.parse(localStorage.getItem(key)) || [];

    render(records);

    function render(data) {

        // CASE 1: EMPTY STATE
        if (!data || data.length === 0) {

            app.innerHTML = `
                <div class="text-center mt-5">
                    <div class="card border-0 shadow p-5 rounded-4">
                        <h4 class="text-muted">No Medical Records Found</h4>
                        <p class="text-secondary">
                            Your medical reports will appear here after consultation.
                        </p>
                    </div>
                </div>
            `;

            return;
        }

        // CASE 2: SHOW RECORDS
        app.innerHTML = `
            <div class="row">
                ${data.map(rec => `
                    <div class="col-lg-6 mb-4">
                        <div class="card border-0 shadow rounded-4 p-4">

                            <h5 class="text-primary">Diagnosis</h5>
                            <p>${rec.diagnosis}</p>

                            <h5 class="text-success">Prescription</h5>
                            <p>${rec.prescription}</p>

                            <h5 class="text-warning">Notes</h5>
                            <p>${rec.notes}</p>

                            <hr>

                            <p><b>Doctor:</b> ${rec.doctor}</p>
                            <p><b>Date:</b> ${rec.date}</p>

                        </div>
                    </div>
                `).join("")}
            </div>
        `;
    }

});
</script>

</body>
</html>
