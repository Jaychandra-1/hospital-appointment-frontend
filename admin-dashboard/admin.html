<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        /* ==========================
   Admin Login
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:linear-gradient(135deg,#0f172a,#1e3a8a);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.admin-login-card{

    width:420px;

    background:#ffffff;

    border-radius:18px;

    padding:40px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.login-logo{

    text-align:center;

    margin-bottom:30px;

}

.login-logo i{

    font-size:60px;

    color:#2FA8BF;

    margin-bottom:10px;

}

.login-logo h2{

    color:#1f2937;

}

.login-logo p{

    color:#6b7280;

}

.input-box{

    margin-bottom:20px;

}

.input-box label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

}

.input-box input{

    width:100%;

    padding:12px;

    border:1px solid #d1d5db;

    border-radius:8px;

    font-size:15px;

}

.input-box input:focus{

    outline:none;

    border-color:#2FA8BF;

}

.remember-row{

    margin-bottom:25px;

}

.login-btn{

    width:100%;

    padding:13px;

    border:none;

    background:#2FA8BF;

    color:#fff;

    font-size:16px;

    border-radius:8px;

    cursor:pointer;

    transition:.3s;

}

.login-btn:hover{

    background:#23879a;

}

.back-link{

    display:block;

    margin-top:20px;

    text-align:center;

    color:#2FA8BF;

    text-decoration:none;

}

.back-link:hover{

    text-decoration:underline;

}

.forgot-password{

    text-align:right;

    margin-bottom:20px;

}

.forgot-password a{

    text-decoration:none;

    color:#2FA8BF;

    font-size:14px;

}

.forgot-password a:hover{

    text-decoration:underline;

}

.login-logo-img{

    width:90px;

    height:90px;

    object-fit:contain;

    margin-bottom:15px;

}


.login-error{

    display:none;

    color:#dc2626;

    font-size:14px;

    margin-top:8px;

}
/* Password Toggle */

.password-box{

    position:relative;

}

.password-box input{

    width:100%;

    padding-right:45px;

}

.password-box i{

    position:absolute;

    right:15px;

    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    color:#6b7280;

}

    </style>
</head>
<body>

<div class="admin-login-container">

    <div class="admin-login-card">

        <div class="login-logo">

    <img
        src="assets/medi-connect-logo.jpeg"
        alt="MediConnect Logo"
        class="login-logo-img"
    >

    <h2>MediConnect</h2>

    <p>Administrator Portal</p>

</div>

        <form id="adminLoginForm">

            <div class="input-box">

                <label>Admin ID</label>

                <input
                    type="text"
                    id="adminId"
                    placeholder="Enter Admin ID"
                    required
                >
                <small
    id="loginError"
    style="color:red; display:none; margin-top:5px;">
    Invalid Username or Password
</small>

            </div>

           <div class="input-box">

    <label>Password</label>

    <div class="password-box">

        <input
            type="password"
            id="adminPassword"
            placeholder="Enter Password"
            required
        >

        <i
            class="fa-solid fa-eye-slash"
            id="togglePassword">
        </i>

    </div>

    <small id="loginError" class="login-error">

        Invalid Username or Password

    </small>

</div>

            <div class="remember-row">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

            </div>

            <div class="forgot-password">

    <a href="#" id="forgotPassword">

        Forgot Password?

    </a>

</div>

            <button
    type="submit"
    class="login-btn"
    id="adminLoginBtn">

    Login

</button>

            <a href="../index.html" class="back-link">

                ← Back to Main Login

            </a>

        </form>

    </div>

</div>

<script>

/* ==========================
   Admin Login
========================== */

const adminLoginForm =
document.getElementById("adminLoginForm");

if(adminLoginForm){

    adminLoginForm.addEventListener("submit", function(e){

        e.preventDefault();

        const username =
        document.getElementById("adminId").value.trim();

        const password =
        document.getElementById("adminPassword").value.trim();

        document.getElementById("loginError").style.display = "none";

        if(username === "admin" &&
           password === "admin123"){

            window.location.href =
            "admin-dashboard.html";

        }
        else{

            const error =
document.getElementById("loginError");

error.style.display = "block";

        }

    });

}

const forgotPassword =
document.getElementById("forgotPassword");

if(forgotPassword){

    forgotPassword.addEventListener("click", function(e){

        e.preventDefault();

        alert("Password reset will be available after backend integration.");

    });

}

const adminId =
document.getElementById("adminId");

const adminPassword =
document.getElementById("adminPassword");

if(adminId){

    adminId.addEventListener("input", function(){

        document.getElementById("loginError").style.display = "none";

    });

}

if(adminPassword){

    adminPassword.addEventListener("input", function(){

        document.getElementById("loginError").style.display = "none";

    });

}
/* ==========================
   Show / Hide Password
========================== */

const togglePassword =
document.getElementById("togglePassword");

if(togglePassword){

    togglePassword.addEventListener("click", function(){

        const password =
        document.getElementById("adminPassword");

        if(password.type === "password"){

            password.type = "text";

            this.classList.remove("fa-eye-slash");
            this.classList.add("fa-eye");

        }
        else{

            password.type = "password";

            this.classList.remove("fa-eye");
            this.classList.add("fa-eye-slash");

        }

    });

}

</script>

</body>
</html>
