<!DOCTYPE html>
<html>
<head>

<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}
.container {
    max-width: 800px;
    margin-top: 50px;
}
.card {
    border: none;
    border-radius: 20px;
    box-shadow: 0 5px 30px rgba(0,0,0,0.08);
    padding: 40px;
}
.card h2 {
    color: #0f172a;
    font-weight: 700;
    margin-bottom: 30px;
}
.card h2 i {
    color: #0ea5e9;
    margin-right: 10px;
}
label {
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 5px;
    font-size: 0.9rem;
}
.form-control, .form-select {
    border-radius: 10px;
    padding: 10px 15px;
    border: 2px solid #e2e8f0;
    transition: all 0.3s ease;
}
.form-control:focus, .form-select:focus {
    border-color: #0ea5e9;
    box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
}
.form-control[readonly] {
    background-color: #e9ecef;
    cursor: not-allowed;
}
.btn-primary {
    background: #0f172a;
    border: none;
    padding: 10px 25px;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
}
.btn-primary:hover {
    background: #1e3a8a;
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(15, 23, 42, 0.3);
}
.btn-secondary {
    background: #e2e8f0;
    color: #0f172a;
    border: none;
    padding: 10px 25px;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
}
.btn-secondary:hover {
    background: #cbd5e1;
    transform: translateY(-2px);
}
.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
}
.btn-group .btn {
    min-width: 120px;
}
body.dark-mode {
    background: #1a1a2e;
}
body.dark-mode .card {
    background: #16213e;
    color: white;
}
body.dark-mode .card h2 {
    color: white;
}
body.dark-mode label {
    color: #a0aec0;
}
body.dark-mode .form-control,
body.dark-mode .form-select {
    background: #2d3748;
    border-color: #4a5568;
    color: white;
}
body.dark-mode .form-control:focus,
body.dark-mode .form-select:focus {
    border-color: #0ea5e9;
    background: #2d3748;
}
body.dark-mode .form-control::placeholder {
    color: #a0aec0;
}
body.dark-mode .form-control[readonly] {
    background: #2d3748;
    opacity: 0.7;
}
body.dark-mode .btn-secondary {
    background: #4a5568;
    color: white;
}
body.dark-mode .btn-secondary:hover {
    background: #5a6a7e;
}
.profile-avatar {
    text-align: center;
    margin-bottom: 30px;
}
.profile-avatar i {
    font-size: 80px;
    color: #0ea5e9;
    background: rgba(14, 165, 233, 0.1);
    padding: 20px;
    border-radius: 50%;
}
.invalid-feedback {
    display: none;
    font-size: 0.875rem;
    color: #dc3545;
    margin-top: 5px;
}
.form-control.is-invalid {
    border-color: #dc3545;
}
.form-control.is-valid {
    border-color: #28a745;
}
body.dark-mode .invalid-feedback {
    color: #ff6b6b;
}
@media (max-width: 768px) {
    .container {
        margin-top: 20px;
        padding: 0 15px;
    }
    .card {
        padding: 20px;
    }
    .btn-group {
        flex-direction: column;
    }
    .btn-group .btn {
        width: 100%;
        min-width: unset;
    }
}
</style>

</head>

<body>

<div class="container mt-5">

    <div class="card p-5">

        <div class="profile-avatar">
            <i class="bi bi-person-circle"></i>
        </div>

        <h2 class="text-primary mb-4">
            <i class="bi bi-pencil-square"></i> Patient Profile
        </h2>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Full Name</label>
                <input id="fullname" class="form-control" placeholder="Enter full name">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input id="email" class="form-control" readonly>
                <small class="text-muted">Email cannot be changed</small>
            </div>

            <div class="col-md-6 mb-3">
                <label>Mobile</label>
                <input id="mobile" class="form-control" placeholder="Enter mobile number">
            </div>

            <div class="col-md-6 mb-3">
                <label>Gender</label>
                <select id="gender" class="form-select">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                    <option>Prefer not to say</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-control">
                <div id="dobFeedback" class="invalid-feedback"></div>
                <small class="text-muted">⚠️ Date of birth cannot be in the future</small>
            </div>

            <div class="col-md-6 mb-3">
                <label>Blood Group</label>
                <select id="bloodgroup" class="form-select">
                    <option value="">Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Emergency Contact</label>
                <input id="emergency" class="form-control" placeholder="Emergency contact number">
            </div>

            <div class="col-md-6 mb-3">
                <label>Aadhar Number</label>
                <input id="aadhar" class="form-control" placeholder="Enter Aadhar number">
            </div>

            <div class="col-md-6 mb-3">
                <label>Occupation</label>
                <input id="occupation" class="form-control" placeholder="Enter occupation">
            </div>

            <div class="col-md-12 mb-3">
                <label>Address</label>
                <textarea id="address" class="form-control" rows="3" placeholder="Enter address"></textarea>
            </div>

        </div>

        <div class="btn-group">
            <a href="da.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <button class="btn btn-primary" onclick="saveProfile()">
                <i class="bi bi-check-circle"></i> Save
            </button>
        </div>

    </div>

</div>

<script>
// ===== FIXED: Get CURRENT logged-in patient =====
function getCurrentPatient() {
    // FIRST: Check currentPatientEmail from session (set during login)
    let currentEmail = localStorage.getItem("currentPatientEmail");
    
    if (currentEmail) {
        let patient = JSON.parse(localStorage.getItem(currentEmail));
        if (patient) {
            // Update patientData for compatibility
            localStorage.setItem("patientData", JSON.stringify(patient));
            return patient;
        }
    }
    
    // SECOND: Check patientData (fallback)
    let patientData = JSON.parse(localStorage.getItem("patientData"));
    if (patientData && patientData.email) {
        localStorage.setItem("currentPatientEmail", patientData.email);
        return patientData;
    }
    
    // THIRD: Search all localStorage for patient role (last resort)
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.includes('@')) {
            try {
                const user = JSON.parse(localStorage.getItem(key));
                if (user && user.role === 'Patient') {
                    localStorage.setItem("currentPatientEmail", key);
                    localStorage.setItem("patientData", JSON.stringify(user));
                    return user;
                }
            } catch (e) {}
        }
    }
    
    return null;
}

// ===== Validate DOB (prevents typing future dates) =====
function validateDOB(dateStr) {
    if (!dateStr) return { valid: true, message: "" };
    
    const selectedDate = new Date(dateStr);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    if (selectedDate > today) {
        return { valid: false, message: "❌ Date of birth cannot be in the future." };
    }
    
    const minDate = new Date(today);
    minDate.setFullYear(minDate.getFullYear() - 150);
    if (selectedDate < minDate) {
        return { valid: false, message: "❌ Please enter a valid date of birth." };
    }
    
    return { valid: true, message: "✅ Valid date of birth." };
}

// ===== Real-time DOB validation =====
document.getElementById("dob").addEventListener("input", function() {
    const dobValue = this.value;
    const feedback = document.getElementById("dobFeedback");
    
    if (!dobValue) {
        this.classList.remove("is-invalid", "is-valid");
        feedback.style.display = "none";
        return;
    }
    
    const result = validateDOB(dobValue);
    
    if (result.valid) {
        this.classList.remove("is-invalid");
        this.classList.add("is-valid");
        feedback.style.display = "none";
    } else {
        this.classList.remove("is-valid");
        this.classList.add("is-invalid");
        feedback.textContent = result.message;
        feedback.style.display = "block";
    }
});

// ===== Set max date for DOB to today (auto-updates daily) =====
function setMaxDate() {
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    const dobInput = document.getElementById("dob");
    dobInput.setAttribute("max", todayStr);
}

// ===== Load patient data into form =====
function loadProfile() {
    // Get the current logged-in patient
    let patient = getCurrentPatient();
    
    if (!patient) {
        alert("No patient data found. Please login first.");
        window.location.href = "landing.html";
        return;
    }

    // Populate form fields with patient data
    document.getElementById("fullname").value = patient.fullname || patient.name || '';
    document.getElementById("email").value = patient.email || '';
    document.getElementById("mobile").value = patient.mobile || patient.phone || '';
    document.getElementById("gender").value = patient.gender || 'Prefer not to say';
    document.getElementById("dob").value = patient.dob || '';
    document.getElementById("address").value = patient.address || '';
    document.getElementById("bloodgroup").value = patient.bloodgroup || patient.blood || '';
    document.getElementById("emergency").value = patient.emergency || '';
    document.getElementById("aadhar").value = patient.aadhar || '';
    document.getElementById("occupation").value = patient.occupation || '';
    
    // Validate loaded DOB
    if (patient.dob) {
        const result = validateDOB(patient.dob);
        const dobInput = document.getElementById("dob");
        const feedback = document.getElementById("dobFeedback");
        if (!result.valid) {
            dobInput.classList.add("is-invalid");
            feedback.textContent = result.message;
            feedback.style.display = "block";
        }
    }
}

// ===== Save profile =====
function saveProfile() {
    const email = document.getElementById("email").value.trim();
    const dob = document.getElementById("dob").value;
    
    if (!email) {
        alert("Error: No email found. Please login again.");
        return;
    }
    
    // Validate DOB before saving
    const dobResult = validateDOB(dob);
    if (!dobResult.valid && dob) {
        alert("❌ " + dobResult.message);
        document.getElementById("dob").focus();
        return;
    }

    // Get existing data to preserve password and role
    let existingData = getCurrentPatient() || {};
    
    // Create updated user object
    let user = {
        name: document.getElementById("fullname").value.trim(),
        fullname: document.getElementById("fullname").value.trim(),
        email: email,
        mobile: document.getElementById("mobile").value.trim(),
        phone: document.getElementById("mobile").value.trim(),
        gender: document.getElementById("gender").value,
        dob: dob,
        address: document.getElementById("address").value.trim(),
        bloodgroup: document.getElementById("bloodgroup").value,
        blood: document.getElementById("bloodgroup").value,
        emergency: document.getElementById("emergency").value.trim(),
        aadhar: document.getElementById("aadhar").value.trim(),
        occupation: document.getElementById("occupation").value.trim(),
        role: existingData.role || 'Patient',
        password: existingData.password || ''
    };

    // Save using email as key
    localStorage.setItem(email, JSON.stringify(user));
    
    // Also update patientData
    localStorage.setItem("patientData", JSON.stringify(user));
    
    // Keep session alive
    localStorage.setItem("currentPatientEmail", email);

    alert("✅ Profile Saved Successfully");
}

// ===== Dark mode =====
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
}

// ===== Load profile on page load =====
window.onload = function() {
    setMaxDate();
    loadProfile();
};

// ===== Auto-update max date when page becomes visible =====
document.addEventListener("visibilitychange", function() {
    if (!document.hidden) {
        setMaxDate();
        const dobInput = document.getElementById("dob");
        if (dobInput.value) {
            const result = validateDOB(dobInput.value);
            const feedback = document.getElementById("dobFeedback");
            if (!result.valid) {
                dobInput.classList.add("is-invalid");
                feedback.textContent = result.message;
                feedback.style.display = "block";
            }
        }
    }
});
</script>

</body>
</html>
