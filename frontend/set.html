<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<div class="card p-5">

<h2 class="text-primary">

Settings

</h2>

<hr>

<h4>

Theme

</h4>

<button
class="btn btn-dark"
onclick="darkTheme()">

Dark Mode

</button>

<button
class="btn btn-primary"
onclick="lightTheme()">

Light Mode

</button>

<hr>

<h4>

Change Password

</h4>

<input
type="password"
id="newPassword"
class="form-control mb-3"
placeholder="New Password">

<button
class="btn btn-warning"
onclick="changePassword()">

Update Password

</button>

<hr>

<h4>

Account

</h4>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

<button
class="btn btn-outline-danger"
onclick="deleteAccount()">

Delete Account

</button>

<br><br>

<a href="da.html"
class="btn btn-success">

Dashboard

</a>

</div>

</div>

<script>

let currentUser = "Patient";

let currentuser = {
    fullname: "Patient"
};

function darkTheme(){

localStorage.setItem("theme","dark");

applyTheme();

}

function lightTheme(){

localStorage.setItem("theme","light");

applyTheme();

}
function applyTheme(){

let theme = localStorage.getItem("theme");

if(theme === "dark"){

document.body.classList.add("dark-mode");

}else{

document.body.classList.remove("dark-mode");

}

}

applyTheme();
function changePassword(){

    let user =
JSON.parse(localStorage.getItem("patientData"));

let newPassword=
document.getElementById("newPassword").value;

if(newPassword===""){

alert("Enter password");

return;

}

user.password=newPassword;

localStorage.setItem(
"patientData",
JSON.stringify(user)
);

alert("Password Updated");

}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="landing.html";

}

function deleteAccount(){

if(confirm("Delete Account Permanently?")){

    localStorage.removeItem("patientData");

localStorage.removeItem(currentUser+"_appointments");

localStorage.removeItem(currentUser+"_records");

localStorage.removeItem(currentUser+"_notifications");

localStorage.removeItem("currentUser");

window.location.href="reg.html";

}

}
let Theme = localStorage.getItem("theme");

if(theme === "dark"){
    darkTheme();
}
else{
    lightTheme();
}
</script>
<script>

    let theme = localStorage.getItem("theme");
    
    if(theme === "dark"){
    
    document.body.style.background = "#1e293b";
    document.body.style.color = "white";
    
    document.querySelectorAll(".card").forEach(card=>{
        card.style.background = "#334155";
        card.style.color = "white";
    });
    
    }
    
    </script>
</body>
</html>
