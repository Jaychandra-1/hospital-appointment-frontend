<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">
<style>
    body{
    background: linear-gradient(135deg,#e0f2fe,#f8fafc);
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    transition: all 0.4s ease;
}

.card{
    border: none;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    animation: slideUp 0.8s ease;
    transition: all 0.4s ease;
}

h2{
    font-weight: 700;
}

h4{
    color: #334155;
    margin-bottom: 15px;
    font-weight: 600;
}

.btn{
    padding:18px 45px;
font-size:1.2rem;
border:1px solid black;
border-radius:50px;
background:rgb(2960e1,ff4a28,a514b0);
cursor:pointer;
font-weight:bold;
transition:.4s;
box-shadow:0 0 10px gold;
}


.btn:hover{
    transform:scale(1.1);
box-shadow:0 0 50px rgb(2960e1,ff4a28,a514b0);
}

.form-control{
    border-radius: 12px;
    padding: 12px;
    transition: all 0.3s ease;
}

.form-control:focus{
    transform: scale(1.02);
    box-shadow: 0 0 15px rgba(59,130,246,0.3);
    border-color: #3b82f6;
}

hr{
    margin: 25px 0;
}

/* Dark Theme */
.dark-mode{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
}

.dark-mode .card{
    background: #1e293b;
    color: white;
}

.dark-mode h4{
    color: #cbd5e1;
}

.dark-mode .form-control{
    background: #334155;
    color: white;
    border: 1px solid #475569;
}

.dark-mode .form-control::placeholder{
    color: #cbd5e1;
}

/* Page Animation */
@keyframes slideUp{
    from{
        opacity: 0;
        transform: translateY(50px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

/* Button Pulse Animation */
.btn-warning:hover,
.btn-danger:hover{
    animation: pulse 0.6s infinite alternate;
}

@keyframes pulse{
    from{
        transform: scale(1);
    }
    to{
        transform: scale(1.05);
    }
}

/* Dashboard Button */
.btn-success{
    width: 100%;
    font-weight: 600;
}

.card{
    animation:
        slideUp 0.8s ease,
        floating 4s ease-in-out infinite;
}

@keyframes floating{
    0%,100%{
        transform: translateY(0);
    }
    50%{
        transform: translateY(-8px);
    }
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-5">

<h2 class="text-primary">

Settings

</h2>

<hr>

<h4>

Theme

</h4>

<button
class="btn btn-dark"
onclick="darkTheme()">

Dark Mode

</button>

<button
class="btn btn-primary"
onclick="lightTheme()">

Light Mode

</button>

<hr>

<h4>

Change Password

</h4>

<input
type="password"
id="newPassword"
class="form-control mb-3"
placeholder="New Password">

<button
class="btn btn-warning"
onclick="changePassword()">

Update Password

</button>

<hr>

<h4>

Account

</h4>

<button
class="btn btn-danger"
onclick="logout()">

Logout

</button>

<button
class="btn btn-outline-danger"
onclick="deleteAccount()">

Delete Account

</button>

<br><br>

<a href="da.html"
class="btn btn-success">

Dashboard

</a>

</div>

</div>

<script>

let currentUser = "Patient";

let currentuser = {
    fullname: "Patient"
};

function darkTheme(){

localStorage.setItem("theme","dark");

applyTheme();

}

function lightTheme(){

localStorage.setItem("theme","light");

applyTheme();

}
function applyTheme(){

let theme = localStorage.getItem("theme");

if(theme === "dark"){

document.body.classList.add("dark-mode");

}else{

document.body.classList.remove("dark-mode");

}

}

applyTheme();
function changePassword(){

    let user =
JSON.parse(localStorage.getItem("patientData"));

let newPassword=
document.getElementById("newPassword").value;

if(newPassword===""){

alert("Enter password");

return;

}

user.password=newPassword;

localStorage.setItem(
"patientData",
JSON.stringify(user)
);

alert("Password Updated");

}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="landing.html";

}

function deleteAccount(){

if(confirm("Delete Account Permanently?")){

    localStorage.removeItem("patientData");

localStorage.removeItem(currentUser+"_appointments");

localStorage.removeItem(currentUser+"_records");

localStorage.removeItem(currentUser+"_notifications");

localStorage.removeItem("currentUser");

window.location.href="reg.html";

}

}
let Theme = localStorage.getItem("theme");

if(theme === "dark"){
    darkTheme();
}
else{
    lightTheme();
}
</script>
<script>

    let theme = localStorage.getItem("theme");
    
    if(theme === "dark"){
    
    document.body.style.background = "#1e293b";
    document.body.style.color = "white";
    
    document.querySelectorAll(".card").forEach(card=>{
        card.style.background = "#334155";
        card.style.color = "white";
    });
    
    }
    
    </script>
</body>
</html>
