<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">

<div class="card shadow border-0 rounded-4 p-5">

<h2 class="text-primary mb-4">

Book Appointment

</h2>

<form id="appointmentForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Department</label>

<select id="department" class="form-select">

<option>Cardiology</option>
<option>Neurology</option>
<option>Dentistry</option>
<option>Orthopedics</option>
<option>Pediatrics</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Doctor</label>

<select id="doctor" class="form-select">

<option>Dr Rajesh Sharma</option>
<option>Dr Priya Rao</option>
<option>Dr Sneha Patel</option>
<option>Dr Anil Kumar</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Date</label>

<input
type="date"
id="date"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Time Slot</label>

<select id="time" class="form-select">

<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>02:00 PM</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label>Reason For Appointment</label>

<textarea
id="reason"
class="form-control"
rows="3"
required></textarea>

</div>

</div>

<hr>

<h4 class="text-success mb-4">

Payment Details

</h4>

<div class="row">

<div class="col-md-4 mb-3">

<label>Consultation Fee</label>

<input
class="form-control"
value="₹500"
readonly>

</div>

<div class="col-md-8 mb-3">

<label>Payment Method</label>

<select
id="paymentMethod"
class="form-select">

<option value="Razorpay">Razorpay</option>

<option value="PhonePe">PhonePe UPI</option>

<option value="Google Pay">Google Pay UPI</option>

<option value="Paytm">Paytm UPI</option>

<option value="Card">Debit / Credit Card</option>

<option value="Net Banking">Net Banking</option>

</select>

</div>

</div>


<!-- UPI Section -->

<div id="upiSection">

<div class="mb-3">

<label>UPI ID</label>

<input
type="text"
id="upiId"
class="form-control"
placeholder="example@upi">

</div>

</div>


<!-- Card Section -->

<div id="cardSection" style="display:none;">

<div class="row">

<div class="col-md-6 mb-3">

<label>Card Number</label>

<input
type="text"
id="cardNumber"
class="form-control"
placeholder="1234 5678 9012 3456">

</div>

<div class="col-md-3 mb-3">

<label>CVV</label>

<input
type="password"
id="cvv"
class="form-control"
placeholder="123">

</div>

<div class="col-md-3 mb-3">

<label>Expiry</label>

<input
type="text"
id="expiry"
class="form-control"
placeholder="MM/YY">

</div>

</div>

</div>


<!-- Bank Section -->

<div id="bankSection" style="display:none;">

<div class="mb-3">

<label>Select Bank</label>

<select
id="bankName"
class="form-select">

<option>SBI</option>
<option>HDFC Bank</option>
<option>ICICI Bank</option>
<option>Axis Bank</option>
<option>Canara Bank</option>

</select>

</div>

</div>

<button class="btn btn-primary mt-3">

Pay & Confirm Appointment

</button>

<a href="da.html"
class="btn btn-secondary mt-3">

Back

</a>

</form>

</div>

</div>

<script>

let paymentMethod =
document.getElementById("paymentMethod");

paymentMethod.addEventListener("change",function(){

document.getElementById("upiSection").style.display="none";
document.getElementById("cardSection").style.display="none";
document.getElementById("bankSection").style.display="none";

if(paymentMethod.value==="Card"){

document.getElementById("cardSection").style.display="block";

}
else if(paymentMethod.value==="Net Banking"){

document.getElementById("bankSection").style.display="block";

}
else{

document.getElementById("upiSection").style.display="block";

}

});



document.getElementById("appointmentForm")
.addEventListener("submit",function(e){

e.preventDefault();

let patient =
JSON.parse(localStorage.getItem("patientData"));

let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

let appointment = {

id:"APT"+Date.now(),

patientName: patient.fullname,

patientEmail: patient.email,

department:
document.getElementById("department").value,

doctor:
document.getElementById("doctor").value,

date:
document.getElementById("date").value,

time:
document.getElementById("time").value,

reason:
document.getElementById("reason").value,

fee:"₹300",

paymentMethod:
document.getElementById("paymentMethod").value,

paymentStatus:"Paid",

status:"Pending"

};


appointments.push(appointment);

localStorage.setItem(
"appointments",
JSON.stringify(appointments)
);



let notifications =
JSON.parse(
localStorage.getItem(currentUser+"_notifications")
) || [];


notifications.push({

title:"Appointment Confirmed",

message:
"Your appointment with "
+ appointment.doctor
+ " on "
+ appointment.date
+ " at "
+ appointment.time
+ " has been confirmed.",

status:"Unread"

});


localStorage.setItem(
currentUser+"_notifications",
JSON.stringify(notifications)
);


alert("Payment Successful!\nAppointment Confirmed Successfully.");

window.location.href="ap-his.html";

});

</script>
<script>
    if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
    }
    </script>
</body>
</html>
