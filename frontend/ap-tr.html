<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Tracking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container mt-5">

<div class="card p-5">

<h2 class="text-primary">

Appointment Tracking

</h2>

<hr>

<div id="trackingDetails">

</div>

<a href="da.html"
class="btn btn-primary mt-3">

Dashboard

</a>

</div>

</div>

<script>


let currentUser = "Patient";
let appointments =
JSON.parse(localStorage.getItem("appointments")) || [];

if(appointments.length > 0){

let html = "";

appointments.forEach(app => {

let badgeColor = "bg-warning";

if(app.status === "Confirmed")
badgeColor = "bg-success";

if(app.status === "Completed")
badgeColor = "bg-primary";

if(app.status === "Cancelled")
badgeColor = "bg-danger";

html += `

<div class="card mb-3 p-3">

<h5>Appointment ID : ${app.id}</h5>

<p><b>Doctor :</b> ${app.doctor}</p>

<p><b>Department :</b> ${app.department}</p>

<p><b>Date :</b> ${app.date}</p>

<p><b>Time :</b> ${app.time}</p>

<p>
<b>Status :</b>
<span class="badge ${badgeColor}">
${app.status}
</span>
</p>

<ul class="list-group">

<li class="list-group-item">
✔ Appointment Requested
</li>

<li class="list-group-item">
${app.status !== "Pending" ? "✔" : "⏳"}
Waiting For Confirmation
</li>

<li class="list-group-item">
${app.status === "Completed"
? "✔ Consultation Completed"
: "⏳ In Progress"}
</li>

</ul>

</div>

`;

});

document.getElementById("trackingDetails").innerHTML = html;

}
else{

document.getElementById("trackingDetails").innerHTML =
"<h4>No Appointment Found</h4>";

}
</script>
<script>
    if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
    }
    </script>
</body>
</html>
