<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medical Records</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

<h2 class="mb-4 text-primary">Medical Records</h2>

<div id="app"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const app = document.getElementById("app");

    let currentUser = "Patient";

let currentuser = {
    fullname: "Patient"
};
const records =
JSON.parse(localStorage.getItem("medicalRecords")) || [];

    render(records);

    function render(data) {

        // CASE 1: EMPTY STATE
        if (!data || data.length === 0) {

            app.innerHTML = `
                <div class="text-center mt-5">
                    <div class="card border-0 shadow p-5 rounded-4">
                        <h4 class="text-muted">No Medical Records Found</h4>
                        <p class="text-secondary">
                            Your medical reports will appear here after consultation.
                        </p>
                    </div>
                </div>
            `;

            return;
        }

        // CASE 2: SHOW RECORDS
        app.innerHTML = `
            <div class="row">
                ${data.map((rec,index) => `
                    <div class="col-lg-6 mb-4">
                        <div class="card border-0 shadow rounded-4 p-4">

                            <h5 class="text-primary">Diagnosis</h5>
                            <p>${rec.diagnosis}</p>

                            <h5 class="text-success">Prescription</h5>
                            <p>${rec.prescription}</p>

                            <h5 class="text-info">Symptoms</h5>
                            <p>${rec.symptoms}</p>
                            <h5 class="text-warning">Advice</h5>
                            <p>${rec.advice}</p>

                            <hr>
                            

                            <p><b>Doctor:</b> ${rec.doctor}</p>
                            <p><b>Date:</b> ${rec.date}</p>
                            <button
                            class="btn btn-success mt-2"
                            onclick="downloadPrescription(${index})">

                            Download PDF
                            </button>

                        </div>
                    </div>
                `).join("")}
            </div>
        `;
    }


});

function downloadPrescription(index){

const { jsPDF } = window.jspdf;

let records =
JSON.parse(localStorage.getItem("medicalRecords")) || [];

let rec = records[index];

let doc = new jsPDF();

doc.setFontSize(18);
doc.text("Medical Prescription",20,20);

doc.setFontSize(12);

doc.text("Patient: " + rec.patientName,20,40);
doc.text("Doctor: " + rec.doctor,20,50);
doc.text("Date: " + rec.date,20,60);
doc.text("Symptoms: " + rec.symptoms,20,80);
doc.text("Diagnosis: " + rec.diagnosis,20,100);
doc.text("Prescription: " + rec.prescription,20,120);
doc.text("Advice: " + rec.advice,20,140);

doc.save("Prescription.pdf");

}

</script>
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
    }
    </script>
</body>
</html>
